;; global WM settings
[global/wm]

margin-bottom = 0
margin-top = 31
fixed-center = true

include-file = $HOME/.config/polybar/colors.ini

;; app settings
[settings]

throttle-output = 5
throttle-output-for = 10
screenchange-reload = true

pseudo-transparency = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;; Bar Settings
[bar/bar]

width = 100%
height = 23pt

bottom = false

background = ${colors.background}
foreground = ${colors.foreground}
separator = 

line-size = 2
line-color = ${color.background}

border-top-size = 5
border-top-color = #002d333f
border-left-size = 25
border-left-color = #002d333f
border-right-size = 25
border-right-color = #002d333f

padding-left = 2
padding-right = 2

module-margin = 0

fixed-center = true

offset-x = 0%
offset-y = 0%
radius-top = 15
radius-bottom = 15

font-0 = "JetBrainsMono Nerd Font:size=12;3"
font-1 = "Font Awesome:size=13;3"
font-2 = "feather:size=13;3"
font-3 = "JetBrainsMono Nerd Font:size=17;5"
font-4 = "Font Awesome:size=25;3"
font-5 = "feather:size=21;7"

modules-left = xworkspaces sep sep battery sep sep temperature sep sep memory sep sep cpu
modules-center = date_time 
modules-right = pulseaudio sep sep xkeyboard sep sep bluetooth sep sep wlan sep sep sep tray

cursor-click = pointer
cursor-scroll = ns-resize

dim-value = 2.0
enable-ipc = true

[module/sep]
type = custom/text
content = " "

[module/xworkspaces]
type = internal/xworkspaces

label-active-background = ${colors.background}
label-occupied-background = ${colors.background}
label-inactive-background = ${colors.background}
label-empty-background = ${colors.background}

label-active = %name%
label-active-underline= ${colors.blue}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-padding = 1

[module/tray]
type = internal/tray

format-background = ${colors.background}

format-margin = 0px
tray-spacing = 8px

[module/pulseaudio]
type = internal/pulseaudio

format-volume-background = ${colors.background}
format-muted-background = ${colors.background}

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default
master-mixer = Master

format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>

label-muted = Ó®Ć
label-muted-foreground =${colors.red}

ramp-volume-0 = Ó®Č
ramp-volume-1 = Ó®ä
ramp-volume-2 = Ó®č
ramp-volume-foreground = ${colors.blue}

label-volume = %percentage%%

[module/battery]
type = internal/battery
poll-interval = 1

format-full-background = ${colors.background}
format-charging-background = ${colors.background}
format-discharging-background = ${colors.background}
format-low-background = ${colors.background}

battery = BAT0
adapter = ADP0

full-at = 98
low-at = 20

format-full = <label-full>
format-charging = <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <label-low>
format-full-prefix = "ůįĀĻ "
format-charging-prefix = "ůįāĄ "
format-low-prefix = "ůįāÉ "
format-full-prefix-foreground = ${colors.green}
format-charging-prefix-foreground = ${colors.yellow}
format-discharging-ramp-foreground = ${colors.yellow}
format-low-prefix-foreground = ${colors.red}

ramp-capacity-0 = "ůįĀļ "
ramp-capacity-1 = "ůįĀľ "
ramp-capacity-2 = "ůįĀĺ "
ramp-capacity-3 = "ůįāÄ "
ramp-capacity-4 = "ůįāā "
ramp-capacity-foreground = ${colors.cyan}

label-full = "%percentage%%"
label-charging =  "%percentage%%"
label-discharging = "%percentage%%"
label-low = "%percentage%% Low Battery"

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format-background = ${colors.background}

format = <label-layout>
format-prefix = "ůįĆď "
format-prefix-foreground = ${colors.purple}

label-layout = %layout%

[module/memory]
type = internal/memory
interval = 1

format-background = ${colors.background}

format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.blue}

label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 1

format-background = ${colors.background}

format = <label>
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.blue}

label = %percentage%%

[network-base]
type = internal/network
interval = 2

[module/wlan]
inherit = network-base
interface-type = wireless

format-click-left = exec $HOME/.local/bin/wifi_rofi

format-connected-background = ${colors.background}
format-disconnected-background = ${colors.background}

format-connected = <label-connected>
format-connected-foreground = ${colors.cyan}

format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.red}

label-connected = "%{A1:~/.local/bin/wifi_rofi:}ůįĖ©%{A}"
label-disconnected = "%{A1:~/.local/bin/wifi_rofi:}ůįĖ™%{A}"

[module/eth]
inherit = network-base
interface-type = wired

format-background = ${colors.background}

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = Ethernet Connected
label-disconnected = No Ethernet

[module/date_time]
type = custom/script
exec = $HOME/.local/bin/date_time_polybar
interval = 1

click-left = $HOME/.local/bin/date_time_polybar --popup &

format = <label>
format-prefix = "ůĪĎé "
format-prefix-foreground = ${colors.red}
format-padding = 4

label = %output:0:15:...%

[module/bluetooth]
type = custom/script
exec = $HOME/.local/bin/bluetooth_polybar

interval = 1

click-right = exec $HOME/.local/bin/bluetooth_polybar
click-left = exec $HOME/.local/bin/toggle_bluetooth

format-padding = 1
format-background = ${colors.background}

[module/temperature]
type = internal/temperature

interval = 0.5
thermal-zone = 0
zone-type = x86_pkg_temp
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input
base-temperature = 20
warn-temperature = 60

units = false

format = <label>
format-prefix = "ůįŹą "
format-warn-prefix = "ůĪ§č "
format-prefix-foreground = ${colors.red}
format-warn-prefix-foreground = ${colors.red}
format-warn = <label-warn>
format-background = ${colors.background}
format-warn-background = ${colors.background}

label = %temperature-c%¬įC

label-warn = %temperature-c%¬įC
label-warn-foreground = ${colors.red}
