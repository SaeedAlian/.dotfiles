backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 1;

# opacity
active-opacity = 1;
inactive-opacity = 0.95;
frame-opacity = 1;
inactive-opacity-override = false;
blur-background = true;

# blur
blur-method = "dual_kawase";
blur-strength = 1;

# Fading
fading = true;
fade-delta = 4;
no-fading-openclose = false;

# frames
refresh_rate = 0;
vsync = true;

# fading
fade-exclude = [ ];

# border radius
corner-radius = 8;

# window type settings
wintypes: {
		dock = {
				shadow = false;
		};
};

# opacity rules
opacity-rule = [
    "80:class_g = 'Rofi'",
    "90:class_g = 'Kitty' && focused",
    "80:class_g = 'Kitty' && !focused",
    "100:class_g = 'i3lock'",
    "90:class_g = 'Clementine'",
    "98:class_g = 'firefox'",
    "98:class_g = 'Brave-browser'"
];

# xrender sync
xrender-sync-fence = true;
